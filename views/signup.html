<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="container">

        <h1>Expense Tracker</h1>

        <form id="signupForm">

            <input
                type="text"
                id="name"
                placeholder="Enter Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Sign Up
            </button>

        </form>

    </div>

    <script src="signup.js"></script>

</body>
</html>
