<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker Login</title>

    <link rel="stylesheet"
          href="login.css">

</head>

<body>

    <div class="container">

        <h1>Expense Tracker</h1>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <a href="signup.html"
           class="signup-link">

            New User? Sign Up

        </a>

    </div>

    <script src=
    "https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js">
    </script>

    <script src="login.js"></script>

</body>

</html>
